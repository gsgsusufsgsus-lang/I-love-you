<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ของขวัญให้แฟน 🎁</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Tahoma", sans-serif;
    }

    body{
      background: linear-gradient(to bottom, #ffdbe8, #fff5f8);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .card{
      text-align:center;
      padding:20px;
      animation: fade 1s ease;
    }

    h1{
      font-size:55px;
      color:#ff5fa2;
      margin-bottom:20px;
      text-shadow:2px 2px white;
    }

    .gift{
      width:260px;
      cursor:pointer;
      transition:0.4s;
      animation: float 2s ease-in-out infinite;
    }

    .gift:hover{
      transform:scale(1.05);
    }

    p{
      margin-top:20px;
      font-size:24px;
      color:#555;
    }

    button{
      margin-top:20px;
      padding:14px 35px;
      border:none;
      border-radius:50px;
      background:#ff69a6;
      color:white;
      font-size:20px;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    button:hover{
      background:#ff4f95;
      transform:scale(1.05);
    }

    .message{
      display:none;
      margin-top:30px;
      background:white;
      padding:25px;
      border-radius:25px;
      max-width:500px;
      font-size:24px;
      line-height:1.8;
      color:#ff4f95;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      animation: fade 1s ease;
    }

    .heart{
      position:absolute;
      color:#ff7eb6;
      font-size:25px;
      animation: fall linear forwards;
    }

    @keyframes float{
      0%{transform:translateY(0);}
      50%{transform:translateY(-10px);}
      100%{transform:translateY(0);}
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes fall{
      to{
        transform:translateY(100vh);
        opacity:0;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>กำลังมีของขวัญ<br>ส่งถึงเธอ 🎀</h1>

    <img
      class="gift"
      src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png"
      alt="gift"
    >

    <p>ของขวัญมาส่งแล้ว !</p>

    <button onclick="showMessage()">เปิดกล่อง</button>

    <div class="message" id="message">
      เค้าอาจจะไม่ได้ดีที่สุด 💗<br>
      แต่ว่าทุกอย่างที่เค้ามีให้เธอ<br>
      มันจริงทั้งหมดเลยนะ ✨<br><br>

      ขอบคุณที่อยู่ด้วยกันมาตลอด 🌷<br>
      ขอให้เรามีกันแบบนี้ไปนาน ๆ นะ 💞
    </div>

  </div>

  <script>
    function showMessage(){
      document.getElementById("message").style.display = "block";

      for(let i=0;i<30;i++){
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.classList.add("heart");

        heart.style.left = Math.random()*100 + "vw";
        heart.style.top = "-20px";
        heart.style.animationDuration = (Math.random()*3+2)+"s";
        heart.style.fontSize = (Math.random()*20+20)+"px";

        document.body.appendChild(heart);

        setTimeout(()=>{
          heart.remove();
        },5000);
      }
    }
  </script>

</body>
</html>
