<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Itim',cursive;
}

body{
background:linear-gradient(180deg,#ffe1ec,#fff7fb);
overflow-x:hidden;
min-height:100vh;
}

/* หัวใจพื้นหลัง */

.bg-heart{
position:fixed;
top:-10px;
z-index:0;
animation:fall linear forwards;
pointer-events:none;
opacity:.8;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

/* sparkle */

.spark{
position:fixed;
width:8px;
height:8px;
background:white;
border-radius:50%;
animation:spark 2s linear infinite;
pointer-events:none;
}

@keyframes spark{
0%{
transform:scale(0);
opacity:0;
}
50%{
transform:scale(1);
opacity:1;
}
100%{
transform:scale(0);
opacity:0;
}
}

/* หน้าใส่รหัส */

.password-page{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
flex-direction:column;
padding:20px;
position:relative;
z-index:2;
}

.pass-box{
background:#ff7eb3;
padding:35px;
border-radius:35px;
width:340px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.pass-box h2{
font-size:40px;
color:white;
}

.pass-box p{
margin:15px 0;
font-size:20px;
color:white;
}

.inputs{
display:flex;
justify-content:center;
gap:10px;
}

.inputs input{
width:60px;
height:60px;
border:none;
border-radius:18px;
font-size:28px;
text-align:center;
outline:none;
}

.enter-btn{
margin-top:20px;
padding:13px 35px;
border:none;
border-radius:50px;
background:white;
color:#ff4f95;
font-size:22px;
cursor:pointer;
}

.big-text{
margin-top:45px;
font-size:35px;
color:#ff5d9e;
text-align:center;
}

/* เมนู */

.menu-page{
display:none;
padding:40px 20px 100px;
position:relative;
z-index:2;
text-align:center;
}

.menu-title{
font-size:48px;
color:#ff4f95;
margin-bottom:35px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
max-width:550px;
margin:auto;
}

.card{
background:linear-gradient(135deg,#ff76ac,#ff9bc2);
padding:28px 20px;
border-radius:30px;
color:white;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 20px rgba(0,0,0,.1);
}

.card:hover{
transform:translateY(-5px) scale(1.03);
}

.icon{
font-size:45px;
}

.card h3{
margin-top:10px;
font-size:22px;
line-height:1.4;
}

/* popup */

.popup{
position:fixed;
inset:0;
background:#00000070;
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.popup-content{
background:white;
width:100%;
max-width:430px;
padding:35px;
border-radius:35px;
text-align:center;
animation:popup .4s ease;
max-height:90vh;
overflow:auto;
}

@keyframes popup{
from{
transform:scale(.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.popup-content h2{
font-size:35px;
color:#ff4f95;
margin-bottom:15px;
}

.popup-content p{
font-size:22px;
line-height:1.8;
color:#666;
}

.close{
margin-top:20px;
padding:12px 35px;
border:none;
border-radius:50px;
background:#ff4f95;
color:white;
font-size:18px;
cursor:pointer;
}

.choice-btn{
display:block;
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:18px;
background:#ff74ab;
color:white;
font-size:20px;
cursor:pointer;
}

/* นับเวลา */

.counter-box{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-top:20px;
}

.time-card{
background:#ff74ab;
padding:15px;
border-radius:20px;
min-width:85px;
color:white;
}

.time-card h1{
font-size:28px;
}

.footer{
margin-top:60px;
font-size:30px;
color:#ff5b9d;
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="https://files.catbox.moe/6r8w5p.mp3">
</audio>

<div class="password-page" id="passwordPage">

<div class="pass-box">

<h2>กรอกรหัส 💌</h2>

<p>คำใบ้ : วันครบรอบของเรา</p>

<div class="inputs">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<button class="enter-btn" onclick="checkPassword()">
เข้าสู่ระบบ
</button>

</div>

<div class="big-text">
มีแค่อ้วนที่รู้รหัสนี้ 💖
</div>

</div>

<div class="menu-page" id="menuPage">

<h1 class="menu-title">
MY LOVE 💖
</h1>

<div class="grid">

<div class="card" onclick="showLoveTime()">
<div class="icon">⏳</div>
<h3>เราคบกันมานานแค่ไหน</h3>
</div>

<div class="card" onclick="openPopup(
'💌 จดหมายถึงอ้วน',
'บางครั้งความสุขของเค้า ก็เป็นแค่การได้คุยกับอ้วนในทุกวันเองนะ 🌷<br><br>ไม่ต้องมีอะไรพิเศษมาก แค่มีอ้วนอยู่ตรงนี้ ทุกอย่างก็น่ารักไปหมดแล้ว ✨'
)">
<div class="icon">🐰</div>
<h3>จดหมายถึงอ้วน</h3>
</div>

<div class="card" onclick="showChoices()">
<div class="icon">🎀</div>
<h3>เรารู้ใจกันแค่ไหน</h3>
</div>

</div>

<div class="footer">
เค้ารักอ้วนที่สุดเลยย 💖
</div>

</div>

<div class="popup" id="popup">

<div class="popup-content">

<h2 id="popupTitle"></h2>

<p id="popupText"></p>

<div id="loveCounter" style="display:none;">

<video id="loveVideo" autoplay loop muted playsinline
style="
width:100%;
max-width:320px;
height:auto;
border-radius:25px;
border:5px solid #ff8fbc;
margin-top:20px;
">
<source src="f7773926-62e8-4be4-bd1d-070388b40338-1_all_2280.mp4" type="video/mp4">
Your browser does not support the video tag.
</video>

<div class="counter-box">

<div class="time-card">
<h1 id="dayBox">0</h1>
<p>วัน</p>
</div>

<div class="time-card">
<h1 id="hourBox">0</h1>
<p>ชั่วโมง</p>
</div>

<div class="time-card">
<h1 id="minuteBox">0</h1>
<p>นาที</p>
</div>

<div class="time-card">
<h1 id="secondBox">0</h1>
<p>วินาที</p>
</div>

</div>

</div>

<button class="close" onclick="closePopup()">
ปิด
</button>

</div>

</div>

<script>

/* หัวใจ */

for(let i=0;i<35;i++){

let heart=document.createElement("div");

heart.className="bg-heart";

heart.innerHTML=["💖","💕","💞","🌸"][Math.floor(Math.random()*4)];

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*30+15)+"px";

heart.style.animationDuration=(Math.random()*10+10)+"s";

document.body.appendChild(heart);

}

/* sparkle */

for(let i=0;i<50;i++){

let spark=document.createElement("div");

spark.className="spark";

spark.style.left=Math.random()*100+"vw";

spark.style.top=Math.random()*100+"vh";

document.body.appendChild(spark);

}

/* input auto */

const inputs=document.querySelectorAll("input");

inputs.forEach((input,index)=>{

input.addEventListener("input",()=>{

if(input.value.length===1 && index < inputs.length-1){

inputs[index+1].focus();

}

});

});

/* password */

function checkPassword(){

const pass =
inputs[0].value +
inputs[1].value +
inputs[2].value +
inputs[3].value;

if(pass==="0301"){

document.getElementById("passwordPage").style.display="none";

document.getElementById("menuPage").style.display="block";

playMusic();

rainHearts();

}else{

alert("รหัสไม่ถูกน้า 🥺");

}

}

/* music */

function playMusic(){

document.getElementById("music").play();

}

/* popup */

function openPopup(title,text){

document.getElementById("popup").style.display="flex";

document.getElementById("loveCounter").style.display="none";

document.getElementById("popupTitle").innerHTML=title;

document.getElementById("popupText").innerHTML=text;

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

/* นับเวลา */

function showLoveTime(){

document.getElementById("popup").style.display="flex";

document.getElementById("popupTitle").innerHTML=
"💖 ตั้งแต่วันแรกที่คบกัน";

document.getElementById("popupText").innerHTML=
"ทุกวันกับเธอมีความหมายเสมอเลยนะ 🌷";

document.getElementById("loveCounter").style.display="block";

// สั่งให้วิดีโอเริ่มเล่นใหม่ทุกครั้งที่เปิด pop-up
const vdo = document.getElementById("loveVideo");
if(vdo) {
vdo.currentTime = 0;
vdo.play();
}

updateLoveTime();

setInterval(updateLoveTime,1000);

}

function updateLoveTime(){

const startDate = new Date("2026-01-03T00:00:00");

const now = new Date();

const diff = now - startDate;

const days = Math.floor(diff/(1000*60*60*24));

const hours = Math.floor((diff/(1000*60*60))%24);

const minutes = Math.floor((diff/(1000*60))%60);

const seconds = Math.floor((diff/1000)%60);

document.getElementById("dayBox").innerHTML=days;
document.getElementById("hourBox").innerHTML=hours;
document.getElementById("minuteBox").innerHTML=minutes;
document.getElementById("secondBox").innerHTML=seconds;

}

/* คำถาม */

let currentQuestion=0;

const questions=[

{
q:"เราไปเที่ยวครั้งแรกที่ไหน 💖",
a:["⛰️ ภูกระดึง","🌊 ทะเล","🎡 สวนสนุก"],
correct:"⛰️ ภูกระดึง",
message:"💞 ถูกต้องงงง<br><br>ภูกระดึงเป็นทริปแรกของเราเลยนะ สนุกและมีความสุขมาก ✨"
},

{
q:"เค้าชอบให้อ้วนเรียกว่าอะไร 💖",
a:["🧸 เด็กดื้อ","💞 ที่รัก","🐷 อ้วน"],
correct:"🐷 อ้วน",
message:"🤍 ถูกต้องง<br><br>เวลาอ้วนเรียกเค้าว่าอ้วนอะ มันน่ารักมากเลยนะ 💖"
},

{
q:"เค้าชอบเวลาอ้วนทำอะไรมากที่สุด 💖",
a:[
"🫂 กอดเค้า",
"💬 บอกรัก",
"😋 งอแงใส่"
],
correct:"🫂 กอดเค้า",
message:"🤍 ถูกต้องง<br><br>กอดของอ้วนทำให้เค้าสบายใจที่สุดเลย 💞"
},

{
q:"เวลาที่เค้ามีความสุขที่สุดคือ 🥺",
a:[
"📱 ตอนคุยกับอ้วน",
"🍜 ตอนกินของอร่อย",
"😴 ตอนนอน"
],
correct:"📱 ตอนคุยกับอ้วน",
message:"💌 ถูกต้องง<br><br>แค่ได้คุยกับอ้วน วันนั้นก็ดีไปหมดเลย ✨"
},

{
q:"เค้าชอบฟังอะไรตอนคิดถึงอ้วน 🎵",
a:[
"🎶 เพลงเศร้า",
"💖 เพลงรัก",
"😹 คลิปตลก"
],
correct:"💖 เพลงรัก",
message:"🌷 ถูกต้องง<br><br>ฟังแล้วนึกถึงอ้วนตลอดเลย 🤍"
},

{
q:"เวลาอ้วนงอน เค้าจะทำยังไง 🥺",
a:[
"💬 ง้อ🥺",
"😶 เงียบ",
"🎮 เล่นเกม"
],
correct:"💬 ง้อ🥺",
message:"💞 ถูกต้องงง<br><br>ก็ไม่อยากให้อ้วนงอนไง เค้าง้อแน่นอน 💖"
},

{
q:"สิ่งแรกที่เค้าทำเวลาเจออ้วน 👀",
a:[
"😊 จับแก้ม",
"👀 จับตัว",
"💇 กอด"
],
correct:"😊 จับแก้ม",
message:"✨ ถูกต้องง<br><br>แก้มอ้วนมันนุ่มนิ่มน่าจับมากเลยย 🌸"
},

{
q:"เค้าอยากไปเที่ยวกับอ้วนอีกที่ไหน 💕",
a:[
"🌊 ทะเล",
"⛰️ ภูเขา",
"🏕️ ไปได้ทุกที่ถ้ามีอ้วน"
],
correct:"🏕️ ไปได้ทุกที่ถ้ามีอ้วน",
message:"🤍 ถูกต้องงง<br><br>จริง ๆ ไปไหนก็ได้ แค่มีเธออยู่ด้วย 💖"
},

{
q:"เวลาอ้วนหายไป เค้าจะรู้สึกยังไง 🥺",
a:[
"😿 คิดถึง",
"😶 เฉย ๆ",
"🎮 เล่นเกมต่อ"
],
correct:"😿 คิดถึง",
message:"💌 ถูกต้องง<br><br>หายไปนิดเดียวก็คิดถึงแล้วนะ 💞"
},

{
q:"เค้าชอบช่วงเวลาไหนตอนอยู่กับอ้วน 💖",
a:[
"🍜 ตอนกินข้าว",
"📸 ตอนถ่ายรูป",
"🫂 ทุกช่วงเวลา"
],
correct:"🫂 ทุกช่วงเวลา",
message:"🌷 ถูกต้องงง<br><br>เพราะทุกเวลาที่มีอ้วนมันดีหมดเลย ✨"
}

];

function showChoices(){

const random=questions[currentQuestion];

let buttons="";

random.a.forEach(choice=>{

buttons += `
<button class="choice-btn"
onclick="checkAnswer(
'${choice}',
'${random.correct}',
\`${random.message}\`
)">
${choice}
</button>
`;

});

document.getElementById("popup").style.display="flex";

document.getElementById("loveCounter").style.display="none";

document.getElementById("popupTitle").innerHTML=
"🎀 เรารู้ใจกันแค่ไหน";

document.getElementById("popupText").innerHTML=
random.q+"<br><br>"+buttons;

}

function checkAnswer(choice,correct,message){

if(choice===correct){

document.getElementById("popupText").innerHTML=
message+
`
<br><br>
<button class="choice-btn" onclick="nextQuestion()">
ข้อถัดไป 💞
</button>
`;

rainHearts();

}else{

document.getElementById("popupText").innerHTML=
`
🥺 ยังไม่ถูกน้า<br><br>

<button class="choice-btn" onclick="nextQuestion()">
ไปข้อถัดไป 🌷
</button>
`;

}

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion>=questions.length){

document.getElementById("popupText").innerHTML=
`
💖 จบแล้ววว 💖
<br><br>
อ้วนเก่งที่สุดเลยย ได้กี่ข้อบอกเค้าด้วยน้าาา 🌷
`;

currentQuestion=0;

return;

}

showChoices();

}

/* ฝนหัวใจ */

function rainHearts(){

for(let i=0;i<20;i++){

let heart=document.createElement("div");

heart.className="bg-heart";

heart.innerHTML=["💖","💕","💞","🌸"][Math.floor(Math.random()*4)];

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*25+20)+"px";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

}

</script>

</body>
</html>
