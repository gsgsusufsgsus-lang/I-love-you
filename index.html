<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Love Gift 🎁</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Itim',cursive;
}

body{
  overflow:hidden;
  height:100vh;
  background:
  linear-gradient(180deg,#ffd7e8,#fff5fb);
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* พื้นหลังวิ้งๆ */

.bg-heart{
  position:absolute;
  color:#ffffff88;
  animation:floatHeart linear infinite;
  z-index:0;
}

@keyframes floatHeart{
  from{
    transform:translateY(110vh) rotate(0deg);
    opacity:0;
  }

  20%{
    opacity:1;
  }

  to{
    transform:translateY(-120vh) rotate(360deg);
    opacity:0;
  }
}

/* กล่องหลัก */

.container{
  width:90%;
  max-width:520px;
  text-align:center;
  z-index:10;
  animation:fade 1s ease;
}

.title{
  font-size:58px;
  line-height:1.3;
  color:#ff4f95;
  text-shadow:3px 3px white;
}

.sub{
  margin-top:10px;
  color:#777;
  font-size:23px;
}

/* ของขวัญ */

.gift{
  width:290px;
  margin-top:20px;
  cursor:pointer;
  animation:
  floating 2s ease-in-out infinite,
  glow 2s infinite;
  transition:.4s;
  filter:drop-shadow(0 15px 25px rgba(0,0,0,.15));
}

.gift:hover{
  transform:scale(1.05);
}

@keyframes floating{
  0%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
  100%{transform:translateY(0);}
}

@keyframes glow{
  0%{
    filter:drop-shadow(0 0 5px #ff8dc1);
  }

  50%{
    filter:drop-shadow(0 0 20px #ff5fa2);
  }

  100%{
    filter:drop-shadow(0 0 5px #ff8dc1);
  }
}

/* ปุ่ม */

.btn{
  margin-top:25px;
  border:none;
  padding:15px 45px;
  border-radius:999px;
  background:linear-gradient(45deg,#ff5fa2,#ff80b8);
  color:white;
  font-size:23px;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 10px 25px rgba(255,95,162,.35);
}

.btn:hover{
  transform:scale(1.08);
}

/* กล่องข้อความ */

.message-box{
  display:none;
  margin-top:30px;
  background:white;
  padding:30px;
  border-radius:35px;
  box-shadow:0 15px 40px rgba(0,0,0,.12);
  animation:popup .9s ease;
}

.message{
  color:#ff4f95;
  font-size:28px;
  line-height:1.8;
}

/* ปุ่มเสริม */

.action-group{
  margin-top:25px;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.action-btn{
  border:none;
  background:#fff0f6;
  color:#ff4f95;
  padding:12px 22px;
  border-radius:50px;
  cursor:pointer;
  font-size:18px;
  transition:.3s;
}

.action-btn:hover{
  transform:scale(1.08);
  background:#ffd6e8;
}

/* รูปหัวใจ */

.photo{
  width:140px;
  height:140px;
  border-radius:50%;
  object-fit:cover;
  margin-top:20px;
  border:6px solid white;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
  animation:spinSlow 10s linear infinite;
}

@keyframes spinSlow{
  from{
    transform:rotate(0deg);
  }
  to{
    transform:rotate(360deg);
  }
}

/* ดาว */

.spark{
  position:absolute;
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
  animation:sparkle 2s linear infinite;
}

@keyframes sparkle{
  0%{
    transform:scale(0);
    opacity:0;
  }
  50%{
    transform:scale(1);
    opacity:1;
  }
  100%{
    transform:scale(0);
    opacity:0;
  }
}

/* popup */

@keyframes popup{
  0%{
    transform:scale(.4);
    opacity:0;
  }
  100%{
    transform:scale(1);
    opacity:1;
  }
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(30px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* countdown */

.count{
  margin-top:15px;
  font-size:22px;
  color:#ff4f95;
}

/* ล่าง */

.footer{
  position:absolute;
  bottom:15px;
  font-size:16px;
  color:#999;
}

</style>
</head>

<body>

<!-- วิ้งพื้นหลัง -->

<script>
for(let i=0;i<35;i++){

  let bg=document.createElement("div");

  bg.className="bg-heart";

  bg.innerHTML=["💖","💕","💗","💞","🌸"][Math.floor(Math.random()*5)];

  bg.style.left=Math.random()*100+"vw";

  bg.style.fontSize=(Math.random()*30+15)+"px";

  bg.style.animationDuration=(Math.random()*10+10)+"s";

  bg.style.animationDelay=Math.random()*5+"s";

  document.body.appendChild(bg);
}
</script>

<div class="container">

  <div class="title">
    มีของขวัญ 🎀<br>
    ส่งถึงแฟนเค้า
  </div>

  <div class="sub">
    กดเปิดดูได้เลยน้าา 💗
  </div>

  <img
  class="gift"
  onclick="openGift()"
  src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png"
  >

  <br>

  <button class="btn" onclick="openGift()">
    เปิดกล่อง 💝
  </button>

  <div class="message-box" id="box">

    <img
    class="photo"
    src="https://i.pinimg.com/736x/59/6c/f2/596cf2f6fa83f8ef56bb0c8f06d8e9b3.jpg"
    >

    <div class="message">
      เค้ารักเธอมากที่สุดเลยนะ 💖<br><br>

      ขอบคุณที่อยู่กับเค้า<br>
      ในทุกวันเลย 🌷<br><br>

      ขอให้เรามีกันแบบนี้<br>
      ไปนาน ๆ เลยน้า ✨
    </div>

    <div class="count" id="countdown"></div>

    <div class="action-group">

      <button class="action-btn" onclick="playMusic()">
        🎵 เปิดเพลง
      </button>

      <button class="action-btn" onclick="showLove()">
        💌 ข้อความลับ
      </button>

      <button class="action-btn" onclick="rainHearts()">
        💖 โปรยหัวใจ
      </button>

    </div>

  </div>

</div>

<div class="footer">
  made with love 💞
</div>

<!-- เพลง -->

<audio id="music">
<source src="https://files.catbox.moe/6r8w5p.mp3">
</audio>

<script>

/* เปิดกล่อง */

function openGift(){

  document.getElementById("box").style.display="block";

  rainHearts();

  createSparkles();

  playMusic();
}

/* เพลง */

function playMusic(){

  document.getElementById("music").play();
}

/* หัวใจร่วง */

function rainHearts(){

  for(let i=0;i<80;i++){

    let heart=document.createElement("div");

    heart.innerHTML=["💖","💗","💕","💞","🌸"][Math.floor(Math.random()*5)];

    heart.style.position="absolute";

    heart.style.left=Math.random()*100+"vw";

    heart.style.top="-20px";

    heart.style.fontSize=(Math.random()*25+20)+"px";

    heart.style.animation=`fall ${(Math.random()*3)+2}s linear forwards`;

    document.body.appendChild(heart);

    setTimeout(()=>{
      heart.remove();
    },5000);
  }
}

/* sparkle */

function createSparkles(){

  for(let i=0;i<60;i++){

    let s=document.createElement("div");

    s.className="spark";

    s.style.left=Math.random()*100+"vw";

    s.style.top=Math.random()*100+"vh";

    document.body.appendChild(s);

    setTimeout(()=>{
      s.remove();
    },2000);
  }
}

/* popup */

function showLove(){

  alert("เค้าจะรักเธอทุกวันเลยนะคนเก่ง 💖");
}

/* countdown */

const startDate = new Date("2025-01-01");

function updateCountdown(){

  const now = new Date();

  const diff = now - startDate;

  const days = Math.floor(diff / (1000*60*60*24));

  document.getElementById("countdown").innerHTML =
  "เราอยู่ด้วยกันมา 💞 " + days + " วัน";
}

setInterval(updateCountdown,1000);

updateCountdown();

/* css animation */

const style=document.createElement('style');

style.innerHTML=`
@keyframes fall{
  to{
    transform:translateY(110vh) rotate(360deg);
    opacity:0;
  }
}
`;

document.head.appendChild(style);

</script>

</body>
</html>
