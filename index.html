<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Itim',cursive;
}

body{
  background:linear-gradient(to bottom,#ffe1ec,#fff7fb);
  min-height:100vh;
  overflow-x:hidden;
}

/* โหลด */

.loading{
  position:fixed;
  inset:0;
  background:#ffd7e8;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
  animation:hideLoading 1s ease forwards;
  animation-delay:3s;
}

.loading h1{
  color:#ff4f95;
  font-size:50px;
}

.loading p{
  color:#777;
  margin-top:10px;
  font-size:22px;
}

.loader{
  width:80px;
  height:80px;
  border-radius:50%;
  border:8px solid white;
  border-top:8px solid #ff4f95;
  animation:spin 1s linear infinite;
  margin-top:20px;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

@keyframes hideLoading{
  to{
    opacity:0;
    visibility:hidden;
  }
}

/* หน้าใส่รหัส */

.password-page{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  flex-direction:column;
  padding:20px;
}

.pass-box{
  background:#ff74ab;
  padding:35px;
  width:320px;
  border-radius:30px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.pass-box h2{
  color:white;
  font-size:35px;
}

.pass-box p{
  color:white;
  margin:10px 0 20px;
}

.inputs{
  display:flex;
  justify-content:center;
  gap:10px;
}

.inputs input{
  width:55px;
  height:55px;
  border:none;
  border-radius:15px;
  text-align:center;
  font-size:28px;
  outline:none;
}

.enter-btn{
  margin-top:20px;
  background:white;
  border:none;
  color:#ff4f95;
  padding:12px 35px;
  border-radius:50px;
  font-size:20px;
  cursor:pointer;
}

.bottom-text{
  text-align:center;
  margin-top:50px;
  font-size:50px;
  color:#ff5b9d;
}

/* เมนู */

.menu-page{
  display:none;
  padding:40px 20px;
  text-align:center;
}

.menu-title{
  color:#555;
  font-size:35px;
  margin-bottom:25px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  max-width:500px;
  margin:auto;
}

.card{
  background:#ff6fa9;
  border-radius:25px;
  padding:30px 20px;
  color:white;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 10px 20px rgba(0,0,0,.1);
}

.card:hover{
  transform:scale(1.05);
}

.card .icon{
  font-size:45px;
}

.card h3{
  margin-top:10px;
  font-size:24px;
}

/* popup */

.popup{
  position:fixed;
  inset:0;
  background:#00000077;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99;
}

.popup-content{
  width:90%;
  max-width:400px;
  background:white;
  border-radius:30px;
  padding:30px;
  text-align:center;
  animation:popup .4s ease;
}

.popup-content h2{
  color:#ff4f95;
  margin-bottom:15px;
  font-size:35px;
}

.popup-content p{
  font-size:24px;
  line-height:1.7;
  color:#666;
}

.close{
  margin-top:20px;
  border:none;
  background:#ff4f95;
  color:white;
  padding:12px 30px;
  border-radius:50px;
  font-size:18px;
  cursor:pointer;
}

@keyframes popup{
  from{
    transform:scale(.5);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

/* หัวใจ */

.heart{
  position:fixed;
  top:-20px;
  animation:fall linear forwards;
  z-index:1;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(360deg);
    opacity:0;
  }
}

/* เพลง */

.music-btn{
  position:fixed;
  top:15px;
  right:15px;
  background:white;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  box-shadow:0 5px 20px rgba(0,0,0,.15);
  cursor:pointer;
  z-index:99;
}

/* นับวัน */

.days{
  margin-top:30px;
  color:#ff4f95;
  font-size:28px;
}

/* รูป */

.memory-img{
  width:100%;
  border-radius:20px;
  margin-top:15px;
}

</style>
</head>

<body>

<!-- โหลด -->

<div class="loading">
  <h1>กำลังโหลด 💖</h1>
  <p>ของขวัญกำลังมาหาเธอ</p>
  <div class="loader"></div>
</div>

<!-- เพลง -->

<div class="music-btn" onclick="playMusic()">
🎵
</div>

<audio id="music">
<source src="https://files.catbox.moe/6r8w5p.mp3">
</audio>

<!-- หน้าใส่รหัส -->

<div class="password-page" id="passwordPage">

<div class="pass-box">

<h2>กรอกรหัส 💌</h2>

<p>คำใบ้ : วันครบรอบของเรา</p>

<div class="inputs">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<button class="enter-btn" onclick="checkPassword()">
เข้าสู่ระบบ
</button>

</div>

<div class="bottom-text">
ใส่รหัสน้าา~
</div>

</div>

<!-- หน้าเมนู -->

<div class="menu-page" id="menuPage">

<h1 class="menu-title">
เลือกเมนู 💖
</h1>

<div class="grid">

<div class="card" onclick="openPopup('💖 เราคบกันมาแล้ว','เราอยู่ด้วยกันมา '+days+' วันแล้วนะ 🌷')">
<div class="icon">🍒</div>
<h3>เราคบกันมานานเท่าไหร่แล้วนะ</h3>
</div>

<div class="card" onclick="openPopup('💌 จดหมายถึงแฟน','ขอบคุณที่อยู่กับเค้ามาตลอดเลยนะ เค้ารักเธอมากที่สุดเลย 💖')">
<div class="icon">🐰</div>
<h3>จดหมายถึงคนที่น่ารัก</h3>
</div>

<div class="card" onclick="openPopup('🎂 เรารู้จักกัน','ตั้งแต่วันที่เจอเธอ ชีวิตเค้ามีความสุขขึ้นเยอะมาก ✨')">
<div class="icon">🧁</div>
<h3>เรารู้ใจกันมากแค่ไหน</h3>
</div>

<div class="card" onclick="openMemory()">
<div class="icon">📷</div>
<h3>ความทรงจำ</h3>
</div>

</div>

<div class="days" id="daysText"></div>

<div class="bottom-text">
เลือกเมนู
</div>

</div>

<!-- popup -->

<div class="popup" id="popup">

<div class="popup-content">

<h2 id="popupTitle"></h2>

<p id="popupText"></p>

<img
id="memoryImage"
class="memory-img"
style="display:none;"
src="https://i.pinimg.com/736x/59/6c/f2/596cf2f6fa83f8ef56bb0c8f06d8e9b3.jpg"
>

<button class="close" onclick="closePopup()">
ปิด
</button>

</div>

</div>

<script>

/* input auto */

const inputs=document.querySelectorAll("input");

inputs.forEach((input,index)=>{

input.addEventListener("input",()=>{

if(input.value.length===1 && index < inputs.length-1){

inputs[index+1].focus();

}

});

});

/* รหัส */

function checkPassword(){

let pass="";

inputs.forEach(i=>{
pass += i.value;
});

if(pass==="0301"){

document.getElementById("passwordPage").style.display="none";

document.getElementById("menuPage").style.display="block";

rainHearts();

playMusic();

}else{

alert("รหัสไม่ถูกน้าา 🥺");

}

}

/* popup */

function openPopup(title,text){

document.getElementById("popup").style.display="flex";

document.getElementById("popupTitle").innerHTML=title;

document.getElementById("popupText").innerHTML=text;

document.getElementById("memoryImage").style.display="none";

rainHearts();

}

function openMemory(){

document.getElementById("popup").style.display="flex";

document.getElementById("popupTitle").innerHTML="📸 ความทรงจำ";

document.getElementById("popupText").innerHTML="ทุกช่วงเวลาที่มีเธอ มันน่ารักไปหมดเลย 💞";

document.getElementById("memoryImage").style.display="block";

rainHearts();

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

/* เพลง */

function playMusic(){

document.getElementById("music").play();

}

/* หัวใจ */

function rainHearts(){

for(let i=0;i<50;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=["💖","💕","💞","🌸"][Math.floor(Math.random()*4)];

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*25+20)+"px";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

}

/* นับวัน */

const startDate = new Date("2025-03-01");

const now = new Date();

const diff = now - startDate;

const days = Math.floor(diff / (1000*60*60*24));

document.getElementById("daysText").innerHTML =
"เราอยู่ด้วยกันมา 💞 "+days+" วัน";

</script>

</body>
</html>
