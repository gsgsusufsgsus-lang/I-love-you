<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Itim',cursive;
}

body{
background:linear-gradient(180deg,#ffdce9,#fff7fb);
overflow-x:hidden;
min-height:100vh;
}

/* loading */

.loading{
position:fixed;
inset:0;
background:#ffdce9;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
animation:hideLoading 1s ease forwards;
animation-delay:3s;
}

.loading h1{
font-size:55px;
color:#ff4f95;
}

.loading p{
margin-top:10px;
font-size:22px;
color:#777;
}

.loader{
width:80px;
height:80px;
border-radius:50%;
border:8px solid white;
border-top:8px solid #ff4f95;
margin-top:20px;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}

@keyframes hideLoading{
to{
opacity:0;
visibility:hidden;
}
}

/* hearts */

.bg-heart{
position:fixed;
top:-20px;
animation:fall linear forwards;
z-index:0;
opacity:.8;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

/* sparkle */

.spark{
position:fixed;
width:10px;
height:10px;
background:white;
border-radius:50%;
animation:spark 2s linear infinite;
z-index:1;
pointer-events:none;
}

@keyframes spark{
0%{
transform:scale(0);
opacity:0;
}
50%{
transform:scale(1);
opacity:1;
}
100%{
transform:scale(0);
opacity:0;
}
}

/* music */

.music-btn{
position:fixed;
top:15px;
right:15px;
width:65px;
height:65px;
background:white;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
z-index:999;
cursor:pointer;
transition:.3s;
}

.music-btn:hover{
transform:scale(1.1);
}

/* password */

.password-page{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
flex-direction:column;
padding:20px;
position:relative;
z-index:2;
}

.pass-box{
background:#ff74ab;
padding:35px;
width:330px;
border-radius:35px;
text-align:center;
box-shadow:0 15px 30px rgba(0,0,0,.1);
animation:popup .6s ease;
}

.pass-box h2{
font-size:38px;
color:white;
}

.pass-box p{
color:white;
margin:15px 0;
font-size:20px;
}

.inputs{
display:flex;
justify-content:center;
gap:10px;
}

.inputs input{
width:60px;
height:60px;
border:none;
border-radius:18px;
font-size:28px;
text-align:center;
outline:none;
}

.enter-btn{
margin-top:20px;
padding:13px 35px;
border:none;
border-radius:50px;
background:white;
color:#ff4f95;
font-size:22px;
cursor:pointer;
}

.big-text{
margin-top:50px;
font-size:38px;
color:#ff5b9d;
text-align:center;
}

/* menu */

.menu-page{
display:none;
padding:40px 20px 100px;
text-align:center;
position:relative;
z-index:2;
}

.menu-title{
font-size:45px;
color:#ff4f95;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
max-width:550px;
margin:auto;
}

.card{
background:linear-gradient(135deg,#ff74ab,#ff9cc4);
padding:28px 20px;
border-radius:30px;
color:white;
cursor:pointer;
transition:.3s;
box-shadow:0 10px 20px rgba(0,0,0,.1);
}

.card:hover{
transform:translateY(-5px) scale(1.03);
}

.icon{
font-size:45px;
}

.card h3{
margin-top:10px;
font-size:22px;
line-height:1.4;
}

/* popup */

.popup{
position:fixed;
inset:0;
background:#00000077;
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.popup-content{
background:white;
width:100%;
max-width:430px;
padding:35px;
border-radius:35px;
text-align:center;
animation:popup .4s ease;
}

@keyframes popup{
from{
transform:scale(.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.popup-content h2{
font-size:38px;
color:#ff4f95;
margin-bottom:15px;
}

.popup-content p{
font-size:23px;
line-height:1.8;
color:#666;
}

.close{
margin-top:20px;
padding:12px 35px;
border:none;
border-radius:50px;
background:#ff4f95;
color:white;
font-size:18px;
cursor:pointer;
}

.choice-btn{
display:block;
width:100%;
margin-top:12px;
padding:14px;
border:none;
border-radius:18px;
background:#ff74ab;
color:white;
font-size:20px;
cursor:pointer;
transition:.3s;
}

.choice-btn:hover{
transform:scale(1.03);
}

.footer{
margin-top:50px;
font-size:30px;
color:#ff5b9d;
}

.days{
margin-top:25px;
font-size:30px;
color:#ff4f95;
}

</style>
</head>

<body>

<div class="loading">
<h1>กำลังโหลด 💖</h1>
<p>ของขวัญกำลังเดินทางมาหาเธอ</p>
<div class="loader"></div>
</div>

<div class="music-btn" onclick="playMusic()">
🎵
</div>

<audio id="music" loop>
<source src="https://files.catbox.moe/6r8w5p.mp3">
</audio>

<div class="password-page" id="passwordPage">

<div class="pass-box">

<h2>กรอกรหัส 💌</h2>

<p>คำใบ้ : วันครบรอบของเรา</p>

<div class="inputs">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<button class="enter-btn" onclick="checkPassword()">
เข้าสู่ระบบ
</button>

</div>

<div class="big-text">
มีแค่เธอที่รู้รหัสนี้ 💞
</div>

</div>

<div class="menu-page" id="menuPage">

<h1 class="menu-title">
MY LOVE 💖
</h1>

<div class="grid">

<div class="card" onclick="openPopup(
'💖 เราคบกันมาแล้ว',
'เราอยู่ด้วยกันมา '+days+' วันแล้วนะ 🌷<br><br>ขอบคุณที่อยู่ด้วยกันมาตลอดเลยนะ 💞'
)">
<div class="icon">🍒</div>
<h3>เราคบกันมากี่วันแล้ว</h3>
</div>

<div class="card" onclick="openPopup(
'💌 จดหมายถึงเธอ',
'บางครั้งความสุขของเค้า ก็เป็นแค่การได้คุยกับเธอในทุกวันเองนะ 🌷<br><br>ไม่ต้องมีอะไรพิเศษมาก แค่มีเธออยู่ตรงนี้ ทุกอย่างก็น่ารักไปหมดแล้ว ✨<br><br>เธอเหมือนเพลงโปรดที่ฟังแล้วไม่เบื่อเลย 💖'
)">
<div class="icon">🐰</div>
<h3>จดหมายถึงเธอ</h3>
</div>

<div class="card" onclick="showChoices()">
<div class="icon">🎀</div>
<h3>เรารู้ใจกันแค่ไหน</h3>
</div>

</div>

<div class="days" id="daysText"></div>

<div class="footer">
เค้ารักเธอที่สุดเลยนะ 💖
</div>

</div>

<div class="popup" id="popup">

<div class="popup-content">

<h2 id="popupTitle"></h2>

<p id="popupText"></p>

<button class="close" onclick="closePopup()">
ปิด
</button>

</div>

</div>

<script>

/* bg hearts */

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="bg-heart";

heart.innerHTML=["💖","💕","💞","🌸"][Math.floor(Math.random()*4)];

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*30+15)+"px";

heart.style.animationDuration=(Math.random()*10+10)+"s";

document.body.appendChild(heart);

}

/* sparkle */

for(let i=0;i<50;i++){

let spark=document.createElement("div");

spark.className="spark";

spark.style.left=Math.random()*100+"vw";

spark.style.top=Math.random()*100+"vh";

document.body.appendChild(spark);

}

/* auto input */

const inputs=document.querySelectorAll("input");

inputs.forEach((input,index)=>{

input.addEventListener("input",()=>{

if(input.value.length===1 && index < inputs.length-1){

inputs[index+1].focus();

}

});

});

/* password */

function checkPassword(){

let pass="";

inputs.forEach(i=>{
pass += i.value;
});

if(pass==="0301"){

document.getElementById("passwordPage").style.display="none";

document.getElementById("menuPage").style.display="block";

rainHearts();

playMusic();

}else{

alert("รหัสไม่ถูกน้า 🥺");

}

}

/* popup */

function openPopup(title,text){

document.getElementById("popup").style.display="flex";

document.getElementById("popupTitle").innerHTML=title;

document.getElementById("popupText").innerHTML=text;

rainHearts();

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

/* music */

function playMusic(){

document.getElementById("music").play();

}

/* hearts effect */

function rainHearts(){

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="bg-heart";

heart.innerHTML=["💖","💕","💞","🌸"][Math.floor(Math.random()*4)];

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*25+20)+"px";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

}

/* relationship days */

const startDate = new Date("2026-01-03");

const now = new Date();

const diff = now - startDate;

const days = Math.floor(diff / (1000*60*60*24));

document.getElementById("daysText").innerHTML =
"เราอยู่ด้วยกันมา 💞 "+days+" วัน";

/* questions */

let currentQuestion = 0;

const questions = [

{
q:"เราไปเที่ยวครั้งแรกที่ไหน 💖",
a:["⛰️ ภูกระดึง","🌊 ทะเล","🎡 สวนสนุก"],
correct:"⛰️ ภูกระดึง",
message:"💞 ถูกต้องงงง<br><br>ภูกระดึงเป็นทริปแรกของเราเลยนะ ✨"
},

{
q:"เค้าชอบให้เธอเรียกว่าอะไร 💖",
a:["🧸 เด็กดื้อ","💞 ที่รัก","🐷 อ้วน"],
correct:"🐷 อ้วน",
message:"🤍 ถูกต้องง<br><br>เวลาเธอเรียกว่าอ้วน มันน่ารักมากเลยนะ 💖"
},

{
q:"เค้าชอบเวลาเธอทำอะไรมากที่สุด 💖",
a:["🫂 กอดเค้า","💬 บอกรัก","😋 งอแงใส่"],
correct:"🫂 กอดเค้า",
message:"🤍 ถูกต้องง<br><br>กอดของเธอทำให้เค้าสบายใจที่สุดเลย 💞"
},

{
q:"เวลาที่เค้ามีความสุขที่สุดคือ 🥺",
a:["📱 ตอนคุยกับเธอ","🍜 ตอนกินของอร่อย","😴 ตอนนอน"],
correct:"📱 ตอนคุยกับเธอ",
message:"💌 ถูกต้องง<br><br>แค่ได้คุยกับเธอ วันนั้นก็ดีไปหมดเลย ✨"
},

{
q:"เวลาเธอยิ้ม เค้าจะ 🥺",
a:["😊 ยิ้มตาม","📸 อยากถ่ายรูป","💖 ใจละลาย"],
correct:"💖 ใจละลาย",
message:"🤍 ถูกต้องงง<br><br>ยิ้มทีไร ใจเค้าละลายทุกทีเลย 💞"
}

];

function showChoices(){

const random = questions[currentQuestion];

let buttons = "";

random.a.forEach(choice=>{

buttons += `
<button class="choice-btn"
onclick="checkAnswer(
'${choice}',
'${random.correct}',
\`${random.message}\`
)">
${choice}
</button>
`;

});

document.getElementById("popup").style.display="flex";

document.getElementById("popupTitle").innerHTML=
"🎀 เรารู้ใจกันแค่ไหน";

document.getElementById("popupText").innerHTML=
random.q + "<br><br>" + buttons;

}

function checkAnswer(choice,correct,message){

if(choice===correct){

document.getElementById("popupText").innerHTML=
message +
`<br><br>

<button class="choice-btn" onclick="nextQuestion()">
ข้อถัดไป 💞
</button>`;

rainHearts();

}else{

document.getElementById("popupText").innerHTML=
"🥺 ยังไม่ถูกน้า ลองใหม่อีกครั้งง<br><br>

<button class='choice-btn' onclick='nextQuestion()'>
ไปข้อถัดไป 🌷
</button>";

}

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion >= questions.length){

document.getElementById("popupText").innerHTML=
`
💖 จบแล้ววว 💖
<br><br>
เก่งมากเลยนะที่ตอบจนจบ 🌷
<br><br>
เค้ารักเธอที่สุดเลย 🤍
<br><br>

<button class="choice-btn" onclick="restartQuestions()">
เล่นใหม่อีกครั้ง 🎀
</button>
`;

return;

}

showChoices();

}

function restartQuestions(){

currentQuestion = 0;

showChoices();

}

</script>

</body>
</html>
