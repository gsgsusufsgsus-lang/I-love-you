<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ถึงคนพิเศษของฉัน ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: linear-gradient(to bottom right, #ffb6c1, #ffc0cb);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.15);
      padding: 40px;
      border-radius: 25px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      max-width: 500px;
    }

    h1 {
      font-size: 42px;
    }

    p {
      font-size: 20px;
      line-height: 1.7;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      border: none;
      border-radius: 50px;
      background: white;
      color: hotpink;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>รักเธอนะ ❤️</h1>

    <p>
      ขอบคุณที่เข้ามาในชีวิตกันนะ
      อยู่ด้วยกันไปนานๆ เลย 💕
    </p>

    <button onclick="showLove()">กดตรงนี้สิ 💌</button>
  </div>

  <script>
    function showLove() {
      alert('เค้าอาจจะไม่ได้เป็นคนที่ดีที่สุด
อาจจะงี่เง่าบ้าง ดื้อบ้าง งอนเก่งบ้าง
แต่ทุกอย่างที่เค้ารู้สึกกับอ้วน มันจริงทั้งหมดเลยนะ ❤️

ตั้งแต่วันที่อ้วนเข้ามา ชีวิตเค้ามันมีความสุขขึ้นเยอะมาก
แค่ได้คุย ได้เห็นหน้า ได้อยู่ด้วยกัน
วันธรรมดาๆ ของเค้ากลายเป็นวันที่พิเศษทุกวันเลย

ขอบคุณนะที่อยู่ข้างกันมาตลอด
ขอบคุณที่คอยเข้าใจในวันที่เค้าอ่อนแอ
ขอบคุณที่ทำให้รู้ว่าการมีใครสักคนรักจริงๆ มันเป็นยังไง

ต่อให้วันข้างหน้าจะมีอะไรเกิดขึ้น
เค้าก็ยังอยากจับมืออ้วนไว้แบบนี้ไปเรื่อยๆ
อยากอยู่ในทุกช่วงเวลาของอ้วน
ทั้งวันที่มีความสุข วันที่เหนื่อย หรือวันที่ร้องไห้

แล้วก็อยากให้อ้วนรู้ไว้ว่า
อ้วนคือคนสำคัญที่สุดของเค้านะ 💕

เค้ารักอ้วนมากจริงๆ
มากจนบางทีคำว่า “รัก” ยังอธิบายไม่หมดเลย

อยู่ด้วยกันไปนานๆ นะคะคนเก่งของเค้า ❤️ ❤️');
    }
  </script>

</body>
</html>
